---
# vitess_firstboot -- shared role that installs the Vitess-tier firstboot
# script + systemd unit on every per-engine template (vitess-{etcd,tablet,
# gate}-node).
#
# The firstboot script (files/vitess-node-firstboot.sh) is role-agnostic: it
# does NIC discovery + IP->hostname mapping across ALL Vitess-tier IPs
# (etcd .190-.192, control .193, vtgate .194/.195, tablets .196-.201). A clone
# landing on any of those IPs self-identifies; an unmapped IP fails fast.
#
# The systemd unit (templates/vitess-node-firstboot.service.j2) gates on the
# firstboot done-marker so the script runs exactly once per clone.

- name: Install vitess-node-firstboot.sh
  ansible.builtin.copy:
    src: vitess-node-firstboot.sh
    dest: /usr/local/sbin/vitess-node-firstboot.sh
    owner: root
    group: root
    mode: '0755'

- name: Install vitess-node-firstboot.service systemd unit
  ansible.builtin.template:
    src: vitess-node-firstboot.service.j2
    dest: /etc/systemd/system/vitess-node-firstboot.service
    owner: root
    group: root
    mode: '0644'

- name: Enable vitess-node-firstboot.service (runs once on first clone boot)
  ansible.builtin.systemd:
    name: vitess-node-firstboot.service
    enabled: true
    daemon_reload: true
