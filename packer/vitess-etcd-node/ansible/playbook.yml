---
- name: Configure vitess-etcd-node template (Phase 0.O)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    target_user: "{{ target_user | default('nexusadmin') }}"
    vitess_node_etcd_version: "{{ vitess_node_etcd_version | default('3.5.16') }}"

  roles:
    - nexus_identity
    - nexus_network
    - nexus_firewall
    - nexus_observability
    - vitess_firstboot
    - vitess_etcd
